<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gateway</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brandMark" aria-hidden="true"></div>
        <div>
          <div class="brandTitle">Gateway</div>
          <div class="brandSub">Choose a service</div>
        </div>
      </div>
      <div class="topbarRight">
        <button id="refreshBtn" class="btn" type="button">Refresh status</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panelHeader">
          <div>
            <div class="panelTitle">Services</div>
            <div class="panelHint">
              Config: <code>/services.yml</code>
            </div>
          </div>
          <div id="overallStatus" class="overallStatus" aria-live="polite"></div>
        </div>

        <div id="warnings" class="warnings" role="status" aria-live="polite"></div>
        <div id="grid" class="grid" aria-label="Service tiles"></div>
      </section>

      <section class="footnote">
        <div>
          Tiles are configured in <code>services.yml</code>. Routing is defined by
          <code>Caddyfile</code>. If a tile is out of sync with routing or an upstream
          is down, you’ll see a warning badge.
        </div>
      </section>
    </main>

    <script src="/hub.js"></script>
  </body>
</html>
