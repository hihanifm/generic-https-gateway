<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gateway</title>
    <script>
      (function () {
        try {
          var k = "hub-theme";
          var v = localStorage.getItem(k);
          if (v === "light" || v === "dark") {
            document.documentElement.dataset.theme = v;
            return;
          }
        } catch (e) {}
        var dark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbarSpacer" aria-hidden="true"></div>
      <div class="topbarCenter">
        <div class="brand">
          <div class="brandMark" aria-hidden="true"></div>
          <div class="brandHeadline">
            <span id="hubTitle" class="brandTitle">Gateway</span>
            <span class="brandHeadlineSep" aria-hidden="true">·</span>
            <span id="hubTagline" class="brandSub">Choose a service</span>
          </div>
        </div>
      </div>
      <div class="topbarRight">
        <div class="themeToggle" role="radiogroup" aria-label="Theme">
          <label class="themeLabel">
            <input
              class="themeRadio"
              type="radio"
              name="hub-theme"
              id="themeLight"
              value="light"
            />
            <span>Light</span>
          </label>
          <label class="themeLabel">
            <input
              class="themeRadio"
              type="radio"
              name="hub-theme"
              id="themeDark"
              value="dark"
            />
            <span>Dark</span>
          </label>
        </div>
        <button id="refreshBtn" class="btn" type="button">Refresh status</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panelHeader">
          <div>
            <div class="panelTitle">Services</div>
            <div class="panelHint">
              Config: <code>/services.yml</code>
            </div>
          </div>
          <div id="overallStatus" class="overallStatus" aria-live="polite"></div>
        </div>

        <div id="hubDescriptionWrap" class="hubDescriptionWrap" hidden>
          <p id="hubDescription" class="hubDescription"></p>
        </div>

        <div class="tabsWrap" aria-label="Categories">
          <div id="tabs" class="tabs" role="tablist" aria-label="Service categories"></div>
        </div>

        <div id="warnings" class="warnings" role="status" aria-live="polite"></div>
        <div id="grid" class="grid" aria-label="Service tiles"></div>
      </section>

      <section class="footnote">
        <div>
          Tiles are configured in <code>services.yml</code>. Routing is defined by
          <code>Caddyfile</code>. If a tile is out of sync with routing or an upstream
          is down, you’ll see a warning badge.
        </div>
      </section>
    </main>

    <script src="/hub.js"></script>
  </body>
</html>
