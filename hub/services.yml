hub:
  title: SmartOps Hub
  tagline: Efficiency starts with the smallest workflows.
  description: |
    Operational excellence is built through thousands of small improvements. This hub brings together lightweight tools and workflows to eliminate repetitive work, streamline execution, and compound efficiency across the organization.

services:
  - id: app1
    name: App 1
    description: Default upstream service
    path: /service1/
    healthPath: /service1/health
    categories: mno-services, hq-services

  - id: app2
    name: App 2
    description: Secondary upstream service
    path: /service2/
    healthPath: /service2/health
    categories: mno-services

  - id: wnm
    name: WNM (host)
    description: Process on the Docker host, reverse proxied (not a compose service)
    path: /wnm/
    categories: tools

  - id: github
    name: GitHub (external)
    description: External link example
    path: https://github.com/
    categories: githubs, tools

  - id: internal_tool
    name: Internal Tool (direct)
    description: Direct internal link example (not proxied)
    path: http://internal-tool.local/
    categories: tools, automation-tools
