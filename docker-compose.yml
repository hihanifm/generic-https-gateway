services:
  gateway:
    image: caddy:2-alpine
    container_name: generic-gateway
    restart: unless-stopped
    ports:
      - "${EXTERNAL_HTTP_PORT}:${EXTERNAL_HTTP_PORT}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./hub:/srv:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    networks:
      - internal

  app1:
    build:
      context: ./services/app1
    container_name: app1
    restart: unless-stopped
    environment:
      - PORT=${APP1_PORT}
      - APP_NAME=app1
    expose:
      - "${APP1_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APP1_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  app2:
    build:
      context: ./services/app2
    container_name: app2
    restart: unless-stopped
    environment:
      - PORT=${APP2_PORT}
      - APP_NAME=app2
    expose:
      - "${APP2_PORT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APP2_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

networks:
  internal:
    driver: bridge
